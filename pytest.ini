[pytest]
testpaths = tests
python_files = test_*.py
addopts = -v --cov=neuroform --cov-report=term-missing --cov-report=html -W error::UserWarning
markers =
    behavioral: long-running behavioral E2E tests against live services
asyncio_mode = strict
filterwarnings =
    ignore::DeprecationWarning:neo4j
